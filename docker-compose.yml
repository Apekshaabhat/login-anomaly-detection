version: '3.8'

services:
  db:
    image: postgres:13
    environment:
      POSTGRES_DB: login_security
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d login_security"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/login_security
      REDIS_URL: redis://redis:6379
      SECRET_KEY: change-this-before-production
      ADMIN_SECRET_TOKEN: ${ADMIN_SECRET_TOKEN:-change-this-admin-token}
      APP_PUBLIC_URL: http://localhost:8080
      API_PUBLIC_URL: http://localhost:8000
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY:-}
      IPQUALITYSCORE_API_KEY: ${IPQUALITYSCORE_API_KEY:-}
      HIBP_API_KEY: ${HIBP_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      BREVO_FROM_EMAIL: ${BREVO_FROM_EMAIL:-}
      MAXMIND_ACCOUNT_ID: ${MAXMIND_ACCOUNT_ID:-}
      MAXMIND_LICENSE_KEY: ${MAXMIND_LICENSE_KEY:-}
      MAXMIND_GEOIP_DB_PATH: ${MAXMIND_GEOIP_DB_PATH:-}
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:-}
      AUTHY_API_KEY: ${AUTHY_API_KEY:-}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-}
      FINGERPRINTJS_PUBLIC_KEY: ${FINGERPRINTJS_PUBLIC_KEY:-}
      RRWEB_ENABLED: ${RRWEB_ENABLED:-false}
      MAPBOX_ACCESS_TOKEN: ${MAPBOX_ACCESS_TOKEN:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build: .
    command: celery -A app.services.email_tasks.celery_app worker --loglevel=INFO
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/login_security
      REDIS_URL: redis://redis:6379
      SECRET_KEY: change-this-before-production
      ADMIN_SECRET_TOKEN: ${ADMIN_SECRET_TOKEN:-change-this-admin-token}
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY:-}
      IPQUALITYSCORE_API_KEY: ${IPQUALITYSCORE_API_KEY:-}
      HIBP_API_KEY: ${HIBP_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      BREVO_FROM_EMAIL: ${BREVO_FROM_EMAIL:-}
      MAXMIND_ACCOUNT_ID: ${MAXMIND_ACCOUNT_ID:-}
      MAXMIND_LICENSE_KEY: ${MAXMIND_LICENSE_KEY:-}
      MAXMIND_GEOIP_DB_PATH: ${MAXMIND_GEOIP_DB_PATH:-}
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:-}
      AUTHY_API_KEY: ${AUTHY_API_KEY:-}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-}
      FINGERPRINTJS_PUBLIC_KEY: ${FINGERPRINTJS_PUBLIC_KEY:-}
      RRWEB_ENABLED: ${RRWEB_ENABLED:-false}
      MAPBOX_ACCESS_TOKEN: ${MAPBOX_ACCESS_TOKEN:-}
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
